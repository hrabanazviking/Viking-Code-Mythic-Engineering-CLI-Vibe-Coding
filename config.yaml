  # STANDARD FLUX (Censored):
  # model: "black-forest-labs/flux-schnell"
  
  # Safety checker - disabled by default to support uncensored models
  disable_safety_checker: true
  
  # Image settings
  default_width: 1024
  default_height: 1024
  num_inference_steps: 4
  guidance_scale: 2.0

# Game Settings
game:
  # Starting location
  starting_city: "uppsala"
  starting_sub_location: "mead_hall_raven"
  mead_hall_sub_location: "mead_hall_raven"
  starting_year: 850
  
  # Session settings
  auto_save_interval: 5  # minutes
  
  # Difficulty settings
  combat_difficulty: "normal"  # easy, normal, hard, deadly
  random_encounters: true
  
  # Display settings
  show_dice_rolls: false
  show_mechanics: false
  verbose_narration: false
  
  # Memory settings
  short_term_memory_turns: 5
  medium_term_memory_turns: 20
  
  # Housekeeping settings
  auto_generate_characters: true
  auto_generate_quests: true
  auto_generate_locations: true
  auto_generate_portraits: false

# Mystic/Oracle Settings
mystic:
  rune_influence_strength: "strong"  # none, subtle, moderate, strong
  auto_draw_rune_every_n_turns: 3  # 0 to disable
  starting_chaos: 1
  max_chaos: 9
  min_chaos: 1

# Character Generation Defaults
character_generation:
  # Age distribution weights
  age_weights:
    18-24: 30
    25-34: 40
    35-44: 20
    45-54: 8
    55+: 2
  
  # Culture distribution
  culture_weights:
    # Primary Norse cultures
    norse_swedish: 25
    norse_danish: 20
    norse_norwegian: 20
    norse_icelandic: 8
    norse_greenlandic: 2
    norse_danelaw: 5
    norse_irish: 3
    norse_faroeislands: 2
    norse_varangian: 5
    # Foreign cultures
    anglo_saxon: 4
    frankish: 2
    slavic: 2
    byzantine: 1
    arabic: 1
  
  # Class distribution for NPCs
  class_weights:
    fighter: 30
    ranger: 12
    barbarian: 10
    cleric: 8
    bard: 7
    druid: 5
    paladin: 4
    rogue: 2
    monk: 1
    sorcerer: 10
    wizard: 1
    warlock: 1
    bondmaid: 9  # Homebrew support class

# Paths (relative to project root)
paths:
  data: "data"
  charts: "data/charts"
  characters: "data/characters"
  world: "data/world"
  quests: "data/quests"
  sessions: "data/sessions"
  auto_generated: "data/auto_generated"
  memory: "data/memory"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/saga.log"
  console: true

# AI Provider Selection (v4.5.0)
# Options: "openrouter" (default), "ollama", "lmstudio", "openai_compat"
# Set to "ollama" or "lmstudio" to use local models instead of OpenRouter
ai_provider: "openrouter"

# Local AI Settings (only used when ai_provider is not "openrouter")
local_ai:
  provider: "ollama"                    # ollama, lmstudio, openai_compat
  base_url: "http://localhost:11434"    # Ollama default: http://localhost:11434 LM Studio: http://localhost:1234
  model: "L3-8B-Stheno-v3.2-Q4_K_S-imat-1770100443825"                 # Your loaded model name
  
  sub_process:
    model: "L3-8B-Stheno-v3.2-Q4_K_S-imat-1770100443825"
    temperature: 0.6
    max_tokens: 4096

  nsfw:
    model: "L3-8B-Stheno-v3.2-Q4_K_S-imat-1770100443825"
  
  temperature: 0.8
  max_tokens: 127000
  timeout: 120


# Voice I/O (Whisper STT + Chatterbox TTS)
voice:
  enabled: false
  auto_tts: false

  # Self-healing controls
  recovery:
    retry_delay_seconds: 0.8
    base_cooldown_seconds: 1.5
    max_cooldown_seconds: 30.0

  # Microphone recording command. Must produce WAV at {output_file}.
  # Linux example: "arecord -f cd -d 8 {output_file}"
  # macOS example: "ffmpeg -y -f avfoundation -i :0 -t 8 {output_file}"
  # Windows example: "ffmpeg -y -f dshow -i audio="Microphone" -t 8 {output_file}"
  recording:
    command: ""
    timeout_seconds: 30

  # Whisper Speech-to-Text (OpenAI-compatible endpoint)
  stt:
    whisper_url: "http://127.0.0.1:8000/v1/audio/transcriptions"
    model: "whisper-1"
    timeout_seconds: 60
    max_retries: 3
    corrections:
      " yggdrizzle ": " yggdrasil "
      " north saga ": " norse saga "

  # Chatterbox Text-to-Speech (OpenAI-compatible speech endpoint)
  tts:
    chatterbox_url: "http://127.0.0.1:8001/v1/audio/speech"
    model: "chatterbox"
    voice: "default"
    timeout_seconds: 90
    max_retries: 2

  # Audio playback command. Must play file at {audio_file}.
  # Linux examples: "aplay {audio_file}" or "ffplay -nodisp -autoexit {audio_file}"
  # macOS: "afplay {audio_file}"
  # Windows: "powershell -c (New-Object Media.SoundPlayer '{audio_file}').PlaySync();"
  playback:
    command: ""
    timeout_seconds: 120

# Yggdrasil intelligence controls
yggdrasil:
  enable_web_search: true
  web_search_timeout: 8
  web_search_max_results: 5

# ============================================================================
# FEATURE FLAGS
# ============================================================================
features:
  # Phase 2 — Fate-Weaver Protocol
  ENABLE_SOUL_MECHANICS: true       # SoulRegistry (Hugr/Fylgja/Hamingja)
  ENABLE_WYRD_TETHERS: true         # character fate connections
  ENABLE_RUNIC_RESONANCE: true      # rune harmonic field
  ENABLE_OBJECT_AGENCY: true        # sentient objects / bound items
  ENABLE_COSMIC_CYCLES: true        # seasons, long-count cycles

  # Phase 3 — Emotional Engine
  ENABLE_EMOTIONAL_ENGINE: true     # EmotionalEngine + StressSystem
  ENABLE_MENSTRUAL_CYCLE: true      # Biological cycle modifier

# ============================================================================
# EMOTIONAL ENGINE TUNING (only used when ENABLE_EMOTIONAL_ENGINE: true)
# ============================================================================
emotional_engine:
  enabled: true                     # rollout gate layered on top of feature flag
  extraction_v2: true               # keyword extraction with negation/intensifier weighting
  behavior_bias: true               # allow emotion-biased behavior suggestion surfaces
  decay_rate_override: null         # null = use per-character value
  stress_spike_threshold: 40        # stress level → STRESS_SPIKE event
  stress_breakdown_threshold: 80    # stress level → COGNITIVE_BREAKDOWN
  keyword_base_strength: 0.12       # emotion strength per keyword hit
  chronotype_modifier: 0.12         # ±delta for in/out-of-phase TOD

# ============================================================================
# MENSTRUAL CYCLE TUNING
# ============================================================================
menstrual_cycle:
  min_age_menstruating: 18     # characters younger than this skip the cycle
  max_age_premenopausal: 56    # characters older than this skip the cycle
  randomise_start_day: true    # randomise cycle_day if not set in YAML
  
# ============================================================================
# LOG IN SETTINGS
# ============================================================================
security.enable_user_login: true