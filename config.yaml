    model: "L3-8B-Stheno-v3.2-Q4_K_S-imat-1770100443825"
    base_url: "http://localhost:11434"
    temperature: 0.6
    max_tokens: 127000
    timeout: 90

# ============================================================================
# THOR GUARDIAN — Circuit-breaker and retry settings
# ============================================================================
thor_guardian:
  max_failures: 10       # Open circuit after this many consecutive real failures
  cooldown_seconds: 60   # How long the circuit stays open before auto-reset
  max_retries: 0         # Internal retries per guard() call (0 = single attempt;
                         # the outer ai_retry loop handles turn-level retries)

# ============================================================================
# AI RETRY — Turn-level retry loop settings (wraps _ai_complete)
# ============================================================================
ai_retry:
  max_attempts: 10          # Total attempts before returning a fallback response
  simplified_after: 5       # Switch to a simplified/shorter prompt after this many failures
  retry_delay_seconds: 3    # Wait between retries (seconds); applies to every attempt

