  top_p: 0.95              # 0.95 Allows for a wide but logical vocabulary
  top_k: 40                # 40 Keeps the AI from derailing completely
  presence_penalty: 0.4    # 0.4 Encourages the model to introduce new concepts
  frequency_penalty: 0.4   # 0.4 Discourages repeating the exact same words

  # Request settings
  timeout: 120
  max_retries: 3

  # Fraction of the model context window to use for input messages (0.50-1.00).
  # The remainder is reserved for the completion output.
  # 0.95 means 1.9M tokens of a 2M context model are available for input —
  # effectively unlimited for normal usage; no data will be dropped.
  context_budget_factor: 0.95

# Prompt budgeter profile — controls how much of the context window is allocated
# to memory context. Use "large_context" for Grok/Claude/GPT-4 with 128k+ windows.
# Options: large_context (500k cap), balanced (24k cap), low_latency (8k cap)
