  content_mode: "nsfw"
  # Response language preference. Defaults to English.
  language: "English"

# AI routing mode
# - default: use your primary ai_provider/model for all calls.
# - optimized: keep primary model for narration/combat/dialogue,
#              but use local Ollama for auxiliary tasks
#              (enhanced memory summaries + housekeeping enrichment).
ai_routing:
  mode: "default"  # "default" | "optimized"

  # Used only when mode: "optimized"
  # On startup, the engine auto-checks this model and tries to pull it
  # from Ollama if missing (with retry + progress logs).
