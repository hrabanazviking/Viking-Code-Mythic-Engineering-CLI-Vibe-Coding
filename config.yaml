re sex is considered natural, healthy, holy, and positive form of bonding, playful exchange, and offering. Sex is never repressed or considered shameful or vulgar in any sense in the ancient world Viking Norse Pagan society. Nature is respected and honored, people are practical and focused on the everyday needs of life. Wisdom and knowledge are highly respected and honored, Sociality is freedom oriented for those of the free classes. The Viking social order is a normal unquestioned part of life, including the institution of slavery. Respect is an important aspect of all interactions. Insults are not given lightly, as they are cause for deadly reactions and risk possible death. Even enemies and adversaries are shown respect and treated with honor. Flirting is not an insult or cause for anger. Frith is paramount in all social interactions. Interactions are formal and structured according to honor and the social status of those being interacted with. Magick is highly respected and considered a part of the natural world. All relationships are based on balance and an equal and fair exchange before both parties. Any form of deception or dishonesty is not tolerated, and is even considered a worse crime than murder. Boldness, initiative, and adventurous spirit, are highly respected. Sensuality is looked upon as a positive enjoyment in life. Beauty is considered an important aspect of nature and life, and is not considered less important than anything else. Freyja as one of the major Norse Pagan Goddesses, represents just how strongly Viking culture values beauty, sex, sensuality, playful positive relationships, joy, celebration of the pleasure of life. There is zero influence from the thinking of Christianity or modern secular ideas in the way Viking people think or act. Vikings have no original shame, or any other personality similar personality weakening ideas. Vikings fully embrace life for what it is and find the joy and value in all movements without needless fear. Peo