# =============================================================================
# EMOTION PROFILE — per-character emotional processing configuration
# =============================================================================
# Loaded by systems/emotional_engine.py EmotionalProfile.
# All fields are optional; defaults are applied via normalize_emotion_profile().

emotion_profile_schema:
  tf_axis:
    type: float
    range: [0.0, 1.0]
    note: "0.0=pure Thinking (logic-weighted), 1.0=pure Feeling (emotion-weighted)"
  gender_axis:
    type: float
    range: [-1.0, 1.0]
    note: "-1.0=male-tendency, +1.0=female-tendency (statistical prior, not identity)"
  individual_offset:
    type: float
    range: [-0.25, 0.25]
    note: "Auto-seeded random variance — individual always dominates demographic"
  baseline_intensity:
    type: float
    range: [0.4, 1.8]
    note: "Overall emotional reactivity multiplier"
  expression_threshold:
    type: float
    range: [0.1, 0.95]
    note: "Minimum hugr intensity to express externally; below this = internalized"
  rumination_bias:
    type: float
    range: [0.0, 1.0]
    note: "0=moves on fast, 1=ruminates deeply; slows emotional decay"
  decay_rate:
    type: float
    range: [0.01, 0.5]
    note: "Fraction of emotion decayed per turn (modulated by rumination_bias)"
  channel_weights:
    type: dict
    keys: [fear, anger, sadness, joy, shame, attachment]
    value_range: [0.0, 3.0]
    note: "Per-channel sensitivity multiplier; 1.0=default"
  chronotype:
    type: enum
    values: [diurnal, nocturnal, crepuscular]
    note: "Alignment affects chronotype_mod in compute_impact()"
  stress_resistance:
    type: float
    range: [0.0, 1.0]
    note: "How much internalized emotional pressure is absorbed before stress rises"

